vich_uploader:
    db_driver: orm

    mappings:
        exercice_image:
            uri_prefix: /uploads/exercices
            upload_destination: '%kernel.project_dir%/public/uploads/exercices'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
